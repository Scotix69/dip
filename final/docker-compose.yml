services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.0
    container_name: avlan-victoriametrics
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-httpListenAddr=:8428"
      - "-retentionPeriod=1"
    ports:
      - "127.0.0.1:8428:8428"
    volumes:
      - victoriametrics_data:/victoria-metrics-data
    restart: unless-stopped

  netflow-collector:
    image: scotix/avlan-netflow-collector:latest
    container_name: avlan-netflow-collector
    depends_on:
      - victoriametrics
    environment:
      VM_URL: http://victoriametrics:8428
      NETFLOW_LISTEN_HOST: 0.0.0.0
      NETFLOW_LISTEN_PORT: "2055"
      TEMPLATE_TTL_SEC: "3600"
      LOG_LEVEL: INFO
      # VLAN enrichment для NetFlow v5 (опционально):
      # V5_VLAN_IF_MAP: '{"192.168.1.1":{"3":100,"4":200},"*":{"5":999}}'
      # V5_VLAN_SUBNET_MAP: '{"192.168.10.0/24":10,"192.168.20.0/24":20}'
    ports:
      - "2055:2055/udp"
    restart: unless-stopped

  metrics-api:
    image: scotix/avlan-metrics-api:latest
    container_name: avlan-metrics-api
    depends_on:
      - victoriametrics
    environment:
      VM_URL: http://victoriametrics:8428
      AGG_PERIOD_SEC: "60"
      DEFAULT_LINK_CAPACITY_BPS: "100000000"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  victoriametrics_data:
